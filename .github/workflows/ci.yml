name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies (locked)
        run: uv sync --extra dev --frozen

      - name: Ruff (lint)
        run: uv run ruff check .

      - name: Ruff (format check)
        run: uv run ruff format --check .

      - name: Mypy (type check)
        run: uv run mypy

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies (locked)
        run: uv sync --extra dev --frozen

      # The unit tests mock yfinance, so this runs fully offline.
      # tests/smoke.py is not collected (it has no test_* functions) and is
      # the only part that would hit the live Yahoo Finance endpoints.
      - name: Run tests with coverage
        run: uv run pytest -q --cov=yahoo_finance_mcp --cov-fail-under=80

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Build image
        run: docker build -t yahoo-finance-mcp:ci .

      # Start the container and confirm the HTTP server actually serves: a bare
      # GET on the streamable-HTTP endpoint returns 406 (it needs specific
      # headers), so any HTTP response means the server is up.
      - name: Smoke test (server boots and serves HTTP)
        run: |
          docker run -d --rm -p 8000:8000 --name yfmcp yahoo-finance-mcp:ci
          code=000
          for _ in $(seq 1 20); do
            code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/mcp || echo 000)
            [ "$code" != "000" ] && break
            sleep 1
          done
          docker logs yfmcp || true
          docker stop yfmcp || true
          if [ "$code" = "000" ]; then
            echo "::error::server did not respond on :8000"
            exit 1
          fi
          echo "OK: server responded with HTTP $code"
