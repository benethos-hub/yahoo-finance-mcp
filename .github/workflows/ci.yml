name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package with dev dependencies
        run: python -m pip install -e ".[dev]"

      - name: Ruff (lint)
        run: python -m ruff check .

      - name: Ruff (format check)
        run: python -m ruff format --check .

      - name: Mypy (type check)
        run: python -m mypy

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package with dev dependencies
        run: python -m pip install -e ".[dev]"

      # The unit tests mock yfinance, so this runs fully offline.
      # tests/smoke.py is not collected (it has no test_* functions) and is
      # the only part that would hit the live Yahoo Finance endpoints.
      - name: Run tests with coverage
        run: python -m pytest -q --cov=yahoo_finance_mcp --cov-fail-under=80
