name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install dependencies (locked)
        run: uv sync --extra dev --frozen

      - name: Ruff (lint)
        run: uv run ruff check .

      - name: Ruff (format check)
        run: uv run ruff format --check .

      - name: Mypy (type check)
        run: uv run mypy

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies (locked)
        run: uv sync --extra dev --frozen

      # The unit tests mock yfinance, so this runs fully offline.
      # tests/smoke.py is not collected (it has no test_* functions) and is
      # the only part that would hit the live Yahoo Finance endpoints.
      - name: Run tests with coverage
        run: uv run pytest -q --cov=yahoo_finance_mcp --cov-fail-under=80
