# Docker Compose file for hosting the server over the streamable-HTTP transport.
# Usage:
#   docker compose up -d        # build (if needed) and start in the background
#   docker compose logs -f      # follow logs
#   docker compose down         # stop and remove
#
# The modern canonical filename is compose.yaml; `docker compose` also still
# reads the legacy docker-compose.yml name.

services:
  yahoo-finance-mcp:
    build: .
    image: yahoo-finance-mcp:latest
    container_name: yahoo-finance-mcp
    ports:
      # host:container — change the host port if 8000 is taken.
      - "8000:8000"
    restart: unless-stopped
    # All configuration is via environment variables. The image already sets
    # sensible defaults (streamable-HTTP on 0.0.0.0:8000, cache at /cache);
    # override any of them here.
    environment:
      # YF_MCP_TRANSPORT: streamable-http
      # YF_MCP_HOST: "0.0.0.0"
      # YF_MCP_PORT: "8000"
      # YF_MCP_PATH: /mcp
      YF_MCP_LOG_LEVEL: INFO
      YF_MCP_CACHE: "1"
      YF_MCP_CACHE_DIR: /cache
      # Override a single tool's cache TTL (seconds), e.g.:
      # YF_MCP_CACHE_TTL_QUOTE: "15"
    volumes:
      # Persist the result cache across container restarts.
      - yfmcp-cache:/cache

volumes:
  yfmcp-cache:
